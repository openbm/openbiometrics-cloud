name: "Agent: DevOps Monitor"

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

permissions:
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check all services
        id: health
        run: |
          FAILED=""

          # Check API engine
          if ! curl -sf --max-time 10 https://api.openbiometrics.dev/api/v1/health > /dev/null 2>&1; then
            FAILED="${FAILED}api-engine,"
          fi

          # Check SaaS API
          if ! curl -sf --max-time 10 https://api.openbiometrics.dev/health > /dev/null 2>&1; then
            FAILED="${FAILED}api-saas,"
          fi

          # Check marketing site
          if ! curl -sf --max-time 10 https://openbiometrics.dev > /dev/null 2>&1; then
            FAILED="${FAILED}marketing,"
          fi

          # Check docs
          if ! curl -sf --max-time 10 https://docs.openbiometrics.dev > /dev/null 2>&1; then
            FAILED="${FAILED}docs,"
          fi

          # Check dashboard
          if ! curl -sf --max-time 10 https://app.openbiometrics.dev > /dev/null 2>&1; then
            FAILED="${FAILED}dashboard,"
          fi

          if [ -n "$FAILED" ]; then
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "healthy=false" >> $GITHUB_OUTPUT
          else
            echo "healthy=true" >> $GITHUB_OUTPUT
          fi

      - name: Auto-recover API
        if: steps.health.outputs.healthy == 'false' && contains(steps.health.outputs.failed, 'api')
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            systemctl restart openbiometrics openbiometrics-saas
            sleep 5
            curl -sf http://127.0.0.1:8500/api/v1/health && echo "Engine OK" || echo "Engine STILL DOWN"
            curl -sf http://127.0.0.1:8600/health && echo "SaaS OK" || echo "SaaS STILL DOWN"

      - name: Create incident issue
        if: steps.health.outputs.healthy == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const failed = '${{ steps.health.outputs.failed }}'.replace(/,$/, '');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Service outage: ${failed}`,
              body: `## Automated Health Check Failed\n\nFailed services: **${failed}**\n\nTime: ${new Date().toISOString()}\n\nAuto-recovery was attempted for API services. Check server logs if issue persists.\n\n---\n*Created by DevOps Monitor Agent*`,
              labels: ['incident', 'automated']
            });
