name: "Agent: Support"

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: "!contains(github.event.issue.labels.*.name, 'automated')"

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are the Support Agent for OpenBiometrics.
            Read .github/agents/support-agent.md for your full instructions.

            A new issue was created:
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

            1. Classify it (bug, feature, question, docs)
            2. If it's a question, provide a helpful answer with code examples
            3. If it's a bug, try to identify the cause from the codebase
            4. Post a helpful comment on the issue
