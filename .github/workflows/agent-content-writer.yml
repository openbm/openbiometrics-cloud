name: "Agent: Content Writer"

on:
  schedule:
    - cron: '0 6 * * 1,3,5'  # Mon, Wed, Fri at 6am UTC
  workflow_dispatch:
    inputs:
      topic:
        description: 'Specific topic to write about (optional)'
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  write-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mcp_config: |
            {
              "mcpServers": {
                "ahrefs": {
                  "type": "http",
                  "url": "https://api.ahrefs.com/mcp/mcp",
                  "headers": {
                    "Authorization": "Bearer ${{ secrets.AHREFS_MCP_TOKEN }}"
                  }
                },
                "search-console": {
                  "command": "npx",
                  "args": ["-y", "@anthropic-ai/google-search-console-mcp"],
                  "env": {
                    "GOOGLE_APPLICATION_CREDENTIALS_JSON": "${{ secrets.GOOGLE_CREDENTIALS_JSON }}",
                    "SITE_URL": "sc-domain:openbiometrics.dev"
                  }
                }
              }
            }
          prompt: |
            You are the Content Writer agent for OpenBiometrics.
            Read .github/agents/content-writer.md for your full instructions.

            You have access to:
            - Ahrefs MCP: research keywords, check volumes, difficulty, competitors
            - Google Search Console MCP: see what queries bring traffic, impressions, CTR

            ${{ github.event.inputs.topic && format('Write a blog post about: {0}', github.event.inputs.topic) || 'Choose the highest-priority topic from your content pipeline that does not already have a blog post.' }}

            Steps:
            1. Use Search Console to see current traffic and top queries
            2. Use Ahrefs to research keyword opportunities (low KD, decent volume)
            3. List existing posts in marketing/src/pages/blog/
            4. Pick a topic that doesn't exist yet
            5. Write the post using the BlogPost.astro layout
            6. Update the blog index page to include the new post
            7. Build with: cd marketing && npm install && npx astro build
            8. If build succeeds, create a PR with the new content
