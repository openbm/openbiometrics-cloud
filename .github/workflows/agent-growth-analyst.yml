name: "Agent: Growth Analyst"

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 8am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  analyze-growth:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are the Growth Analyst agent for OpenBiometrics.
            Read .github/agents/growth-analyst.md for your full instructions.

            Create a weekly growth report. Analyze:
            1. Check GitHub stars, forks, issues for drinkredwine/openbiometrics
            2. Check npm downloads for 'openbiometrics' package
            3. Review which blog posts exist and suggest new topics
            4. Create a GitHub Issue with your report titled "Weekly Growth Report"
