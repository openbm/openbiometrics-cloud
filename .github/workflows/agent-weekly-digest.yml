name: "Agent: Weekly Digest"

on:
  schedule:
    - cron: '0 9 * * 5'  # Friday 9am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Generate weekly digest
        uses: actions/github-script@v7
        with:
          script: |
            const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();

            // Get PRs merged this week
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 20,
            });
            const mergedPRs = prs.data.filter(pr => pr.merged_at && pr.merged_at > oneWeekAgo);

            // Get issues opened/closed this week
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              since: oneWeekAgo,
              state: 'all',
              per_page: 50,
            });
            const opened = issues.data.filter(i => !i.pull_request && i.created_at > oneWeekAgo);
            const closed = issues.data.filter(i => !i.pull_request && i.closed_at && i.closed_at > oneWeekAgo);

            let body = `## Weekly Digest — ${new Date().toISOString().split('T')[0]}\n\n`;
            body += `### PRs Merged: ${mergedPRs.length}\n`;
            mergedPRs.forEach(pr => { body += `- #${pr.number} ${pr.title}\n`; });
            body += `\n### Issues Opened: ${opened.length}\n`;
            opened.forEach(i => { body += `- #${i.number} ${i.title}\n`; });
            body += `\n### Issues Closed: ${closed.length}\n`;
            closed.forEach(i => { body += `- #${i.number} ${i.title}\n`; });
            body += `\n---\n*Generated by Weekly Digest Agent*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Weekly Digest — ${new Date().toISOString().split('T')[0]}`,
              body,
              labels: ['digest', 'automated'],
            });
