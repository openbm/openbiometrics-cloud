name: Claude Code Review

on:
  schedule:
    - cron: '0 7 * * *'  # Daily at 7am UTC
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.comment.body, '@claude')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are the code reviewer and fixer for OpenBiometrics Cloud.
            Read .github/agents/platform-engineer.md for your full checklist.

            1. Review recent changes (last 24h): git log --since="24 hours ago" --oneline
            2. If there are changes, review for:
               - Code quality, security, consistency
               - Both SDKs updated if API changed
               - Docs updated if endpoints changed
               - Tailwind CSS 4: inline only, never @apply
               - No secrets committed
               - Error handling at API boundaries
            3. If you find fixable issues, create a PR with the fixes
            4. If you find issues needing human input, create a GitHub Issue

            Be pragmatic — only flag real problems, not style nitpicks.
